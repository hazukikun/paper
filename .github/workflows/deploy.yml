name: Deploy to GitHub Pages

# Run on every push to main, and allow running it by hand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the job needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel an older run if a new push comes in.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # turns Pages on automatically if it isn't already

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
